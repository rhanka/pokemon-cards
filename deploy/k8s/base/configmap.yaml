apiVersion: v1
kind: ConfigMap
metadata:
  name: pokemon-cards-config
  labels:
    app.kubernetes.io/name: pokemon-cards
data:
  HOST: "0.0.0.0"
  PORT: "3000"
  DATA_DIR: "/data"
  PUBLIC_ORIGIN: "https://pokemon.sent-tech.ca"
  TCGDEX_BASE_URL: "https://api.tcgdex.net/v2"
  # TCGdex catalogue metadata is MIT-licensed. Artwork and market quote
  # switches remain separately disabled until their own rights are approved.
  TCGDEX_CATALOG_ENABLED: "true"
  POKEMON_TCG_BASE_URL: "https://api.pokemontcg.io/v2"
  POKEMON_TCG_CATALOG_ENABLED: "false"
  CARD_IMAGES_ENABLED: "false"
  MARKET_QUOTES_ENABLED: "false"
  CATALOG_MAX_RESPONSE_BYTES: "2097152"
  CATALOG_CACHE_MAX_BYTES: "268435456"
  # OCR is intentionally disabled. Visual retrieval is enabled only with a
  # separately cleared browser model/index release.
  RECOGNITION_ENABLED: "false"
  RECOGNITION_DATA_PATH: "/app/recognition-data"
  RECOGNITION_MAX_IMAGE_BYTES: "2097152"
  RECOGNITION_MAX_PIXELS: "4000000"
  RECOGNITION_NORMALIZED_MAX_EDGE: "1600"
  RECOGNITION_TIMEOUT_MS: "30000"
  RECOGNITION_IDLE_TIMEOUT_MS: "300000"
  RECOGNITION_RATE_LIMIT_PER_MINUTE: "10"
  RECOGNITION_GLOBAL_RATE_LIMIT_PER_MINUTE: "30"
  RECOGNITION_MAX_CONCURRENT_UPLOADS: "4"
  OIDC_ISSUER: "https://auth.sent-tech.ca"
  OIDC_CLIENT_ID: "pokemon-cards"
  OIDC_AUDIENCE: ""
  OIDC_REQUIRED: "false"
  ACCOUNT_IDENTITY_READY: "false"
  ACCOUNT_RECOVERY_READY: "false"
  SYNC_RETENTION_DAYS: "1826"
  # 1,200 × 2.5 MiB bounds logical sync data at 3 GiB on the 4 GiB PVC.
  SYNC_MAX_ACCOUNTS: "1200"
  SYNC_MAX_ACCOUNT_BYTES: "2621440"
