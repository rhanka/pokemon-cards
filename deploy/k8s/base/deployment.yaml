apiVersion: apps/v1
kind: Deployment
metadata:
  name: pokemon-cards
  labels:
    app.kubernetes.io/name: pokemon-cards
    app.kubernetes.io/component: web
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pokemon-cards
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pokemon-cards
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: pokemon-cards
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cardscope
          image: ghcr.io/rhanka/pokemon-cards:not-published
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: pokemon-cards-config
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 20m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      terminationGracePeriodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pokemon-cards-data
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
