name: CI

on:
  pull_request:
  push:
    branches: [main, "agent/**"]

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm audit --audit-level=high
      - name: Validate Kubernetes manifests
        run: |
          kubectl kustomize deploy/k8s/overlays/prod | docker run --rm -i \
            ghcr.io/yannh/kubeconform@sha256:5103f6f5e89061728aad4ad5a250627dd0fc9b2a92eb876f3762677a4222f9e0 \
            -strict -summary
      - run: docker build --tag pokemon-cards:ci .

  ml-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e "./ml[dev]"
      - run: python -m pytest ml/tests
